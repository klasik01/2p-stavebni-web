# ============================================================
# Deploy 2p-Stavební na Netlify
#
# POTŘEBNÉ GITHUB SECRETS (nastav v Settings → Secrets → Actions):
#
#   NETLIFY_AUTH_TOKEN          – Personal access token z Netlify
#                                 (User settings → Applications → Personal access tokens)
#
#   NETLIFY_STAVEBNI_SITE_ID   – Site ID z Netlify
#                                 (Site settings → General → Site ID)
#
#   VITE_FIREBASE_*            – Firebase config (sdílené s GitHub Pages workflow)
#   VITE_GA_MEASUREMENT_ID     – Google Analytics
# ============================================================

name: Deploy Stavební to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: netlify-stavebni
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Netlify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          DEPLOY_TARGET: netlify
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_STAVEBNI_SITE_ID }}

      - name: Create release tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="stavebni-v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
